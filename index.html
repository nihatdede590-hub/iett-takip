<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080810">
<title>Sefer Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080810;
  --surface:  #10101c;
  --card:     #141420;
  --card2:    #1a1a28;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.1);
  --text:     #f2f2fa;
  --sub:      #7a7a96;
  --dim:      #3a3a52;
  --blue:     #5b9dff;
  --blue-bg:  rgba(91,157,255,0.1);
  --blue-glow:rgba(91,157,255,0.15);
  --green:    #3ecf8e;
  --green-bg: rgba(62,207,142,0.1);
  --green-glow:rgba(62,207,142,0.15);
  --purple:   #9d7ff4;
  --purple-bg:rgba(157,127,244,0.1);
  --purple-glow:rgba(157,127,244,0.15);
  --warn:     #ff8c42;
  --font:     'Inter', system-ui, sans-serif;
  --r:        22px;
  --r-sm:     14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100%;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

/* ── SCROLLABLE PAGE ── */
.page {
  max-width: 420px;
  margin: 0 auto;
  padding: env(safe-area-inset-top, 52px) 16px calc(env(safe-area-inset-bottom, 20px) + 80px);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 4px 2px;
}
.topbar-left { display: flex; flex-direction: column; gap: 2px; }
.app-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--sub);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.app-title {
  font-size: 26px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.03em;
  line-height: 1;
}
.clock-wrap { text-align: right; }
.clock-big {
  font-size: 32px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.04em;
  line-height: 1;
}
.clock-day {
  font-size: 12px;
  color: var(--sub);
  font-weight: 500;
  margin-top: 3px;
  letter-spacing: 0.01em;
}

/* ── TARIFE PILL ── */
.tarife-row { display: flex; align-items: center; gap: 8px; }
.tarife-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--card);
  border: 0.5px solid var(--border2);
  border-radius: 100px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.pulse-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  animation: pdot 2.2s ease-in-out infinite;
}
@keyframes pdot {
  0%,100%{ opacity:1; transform:scale(1); box-shadow:0 0 0 0 var(--green-glow); }
  50%{ opacity:0.5; transform:scale(0.75); box-shadow:0 0 0 4px transparent; }
}

/* ── SECTION LABEL ── */
.sec-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--sub);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 4px 0;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border-radius: var(--r);
  border: 0.5px solid var(--border);
  overflow: hidden;
  position: relative;
  animation: up 0.35s cubic-bezier(.22,.68,0,1.2) both;
}
.card:nth-child(1){ animation-delay:.04s }
.card:nth-child(2){ animation-delay:.10s }
.card:nth-child(3){ animation-delay:.16s }
@keyframes up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* color accent strip */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.c-blue::before   { background: var(--blue); }
.c-green::before  { background: var(--green); }
.c-purple::before { background: var(--purple); }

/* ── CARD TOP ── */
.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 18px 14px;
}
.route-left { display: flex; align-items: center; gap: 10px; }

.hat-badge {
  font-size: 13px;
  font-weight: 800;
  padding: 6px 12px;
  border-radius: var(--r-sm);
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.b-blue   { background: var(--blue-bg);   color: var(--blue); }
.b-green  { background: var(--green-bg);  color: var(--green); }
.b-purple { background: var(--purple-bg); color: var(--purple); }

.route-text {}
.route-dir {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.route-sub {
  font-size: 11px;
  color: var(--sub);
  margin-top: 2px;
  font-weight: 500;
}

.sefer-pill {
  font-size: 11px;
  font-weight: 600;
  color: var(--sub);
  background: var(--card2);
  border: 0.5px solid var(--border);
  border-radius: 100px;
  padding: 4px 10px;
  white-space: nowrap;
}

/* ── DIVIDER ── */
.divider {
  height: 0.5px;
  background: var(--border);
  margin: 0 18px;
}

/* ── 3-SLOT GRID ── */
.slots {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  padding: 6px 0 4px;
}
.slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 14px 8px 12px;
  position: relative;
  min-height: 88px;
}
.slot + .slot::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; height: 60%;
  width: 0.5px;
  background: var(--border);
}
.slot-lbl {
  font-size: 9px;
  font-weight: 700;
  color: var(--dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.slot-t {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 6px;
  transition: color 0.3s;
}
.col-past   { color: var(--dim); }
.col-blue   { color: var(--blue); }
.col-green  { color: var(--green); }
.col-purple { color: var(--purple); }
.col-next   { color: var(--text); }
.col-none   { color: #1e1e30; }

.slot-diff {
  font-size: 11px;
  font-weight: 600;
  color: var(--sub);
  min-height: 14px;
  text-align: center;
}
.slot-diff.hot {
  color: var(--warn);
  animation: blink 1s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── CARD BOTTOM ── */
.card-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px 16px;
}
.gun-chip {
  font-size: 12px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 100px;
}
.gc-blue   { background: var(--blue-bg);   color: var(--blue); }
.gc-green  { background: var(--green-bg);  color: var(--green); }
.gc-purple { background: var(--purple-bg); color: var(--purple); }

.refresh-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--card2);
  border: 0.5px solid var(--border2);
  border-radius: 100px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--sub);
  cursor: pointer;
  font-family: var(--font);
  transition: background 0.12s, color 0.12s;
  -webkit-user-select: none;
  min-height: 36px;
}
.refresh-btn:active { background: var(--border2); color: var(--text); }

/* ── BOTTOM STATUS BAR ── */
.statusbar {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 420px;
  background: rgba(8,8,16,0.9);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 0.5px solid var(--border);
  padding: 12px 20px calc(env(safe-area-inset-bottom,16px) + 8px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  z-index: 999;
}
.status-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--sub);
}
.update-time { font-size: 12px; font-weight: 500; color: var(--dim); }
</style>
</head>
<body>

<div class="page">

      <button class="refresh-btn" onclick="render()">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M12 7A5 5 0 1 1 7 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M7 2 9.5 4M7 2 9.5 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Yenile
      </button>

</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <div class="status-chip">
    <div class="pulse-dot"></div>
    Resmi İETT Tarifesi
  </div>

<script>
const DATA = {

    C:["06:44","07:09","07:34","07:58","08:25","08:52","09:15","09:41","10:04","10:31","10:55","11:21","11:46","12:10","12:35","13:01","13:24","13:52","14:14","14:41","15:05","15:32","15:55","16:23","16:46","17:11","17:34","17:59","18:24","18:49","19:14","19:40"],
    P:["06:44","07:09","07:34","07:58","08:25","08:52","09:15","09:41","10:04","10:31","10:55","11:21","11:46","12:10","12:35","13:01","13:24","13:52","14:14","14:41","15:05","15:32","15:55","16:23","16:46","17:11","17:34","17:59","18:24","18:49","19:14","19:40"]
  },
  FY:{
    I:["06:30","06:40","06:48","06:55","07:00","07:05","07:10","07:15","07:20","07:25","07:30","07:35","07:40","07:45","07:50","07:55","08:00","08:05","08:10","08:15","08:20","08:26","08:32","08:40","08:48","08:57","09:06","09:15","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","13:30","14:00","14:30"],
    C:["07:00","07:30","07:50","08:10","08:30","08:50","09:10","09:30","09:50","10:10","10:30","10:50","11:10","11:30","11:49","12:07","12:24","12:41","13:00","13:20","13:40","14:00","14:20","14:40","15:00","15:20","15:40","16:00","16:20","16:40","17:00","17:20","17:40","18:00","18:20","18:41","19:02","19:23","19:45","20:10","20:30","20:50","21:10","21:30","21:50","22:10","22:30"],
    P:["07:00","08:00","09:00","10:00","11:00","11:30","12:00","12:35","13:21","13:48","14:15","14:42","15:09","15:36","16:03","16:30","16:57","17:24","17:51","18:20","18:45","19:05","19:30","20:00","20:30","21:00","21:30","22:00"]
  },
  FK:{
    I:["14:30","14:45","15:00","15:15","15:30","15:42","15:54","16:06","16:18","16:30","16:42","16:54","17:06","17:18","17:30","17:42","17:54","18:06","18:18","18:30","18:42","18:54","19:06","19:18","19:29","19:40","19:51","20:02","20:13","20:24","20:35","20:46","20:57","21:08","21:19","21:30","21:42","21:54","22:06","22:20"],
    C:["07:25","08:00","08:20","08:40","09:00","09:20","09:40","10:00","10:20","10:40","11:00","11:20","11:40","12:00","12:40","13:00","13:20","13:40","14:00","14:20","14:40","15:00","15:20","15:40","16:00","16:20","16:40","17:00","17:20","17:40","18:00","18:20","18:40","19:00","19:20","19:40","20:00","20:20","20:40","21:00","21:20","21:40","22:00","22:20","22:40","23:00"],
    P:["07:30","08:30","09:30","10:30","11:30","12:00","12:40","13:07","14:01","14:28","14:55","15:22","15:49","16:16","16:43","17:10","17:37","18:04","18:35","19:00","19:20","20:00","20:30","21:00","21:30","22:00","22:30"]
  }
};

function getGun(){const d=new Date().getDay();return d===6?"C":d===0?"P":"I";}
function gunAdi(g){return g==="C"?"Cumartesi":g==="P"?"Pazar":"Hafta İçi";}
function nowMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function toMin(s){const[h,m]=s.split(":").map(Number);return h*60+m;}
function diff(s){
  const d=toMin(s)-nowMin();
  if(d===0)return"şu an";
  if(d>0)return d<=5?d+"dk ⚡":d+"dk sonra";
  return Math.abs(d)+"dk önce";
}

function mkslots(arr, colNext){
  const now=nowMin();
  const past=arr.filter(s=>toMin(s)<=now);
  const fut=arr.filter(s=>toMin(s)>now);
  const son=past.length?past[past.length-1]:null;
  const bir=fut.length?fut[0]:null;
  const iki=fut.length>1?fut[1]:null;

  function sl(lbl,s,col){
    if(!s)return`<div class="slot"><div class="slot-lbl">${lbl}</div><div class="slot-t col-none">──</div><div class="slot-diff"></div></div>`;
    const hot=toMin(s)-now>=0&&toMin(s)-now<=5;
    return`<div class="slot"><div class="slot-lbl">${lbl}</div><div class="slot-t ${col}">${s}</div><div class="slot-diff${hot?" hot":""}">${diff(s)}</div></div>`;
  }
  return sl("Son kalkan",son,"col-past")+sl("Bir sonraki",bir,colNext)+sl("İki sonraki",iki,"col-next");
}

function renderCard(arr,slotsId,cntId,gunId,gunCls,colNext){
  const g=getGun();
  const saatler=arr[g]||arr.I;
  document.getElementById(slotsId).innerHTML=saatler.length?mkslots(saatler,colNext):`<div style="grid-column:1/-1;padding:24px;text-align:center;color:var(--sub);font-size:14px">Bugün sefer yok.</div>`;
  document.getElementById(cntId).textContent=saatler.length+" sefer";
  document.getElementById(gunId).textContent=gunAdi(g);
  document.getElementById(gunId).className="gun-chip "+gunCls;
}

function render(){
  const n=new Date();
  const g=getGun();
  const GUNLER=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
  const AYLAR=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
  document.getElementById("clock").textContent=n.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("clock-day").textContent=GUNLER[n.getDay()]+" · "+n.getDate()+" "+AYLAR[n.getMonth()];
  document.getElementById("tarife-label").textContent=gunAdi(g)+" Tarifesi";
  document.getElementById("updated").textContent=n.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})+" güncellendi";

  renderCard(DATA.KM,"slots-km","cnt-km","gun-km","gc-blue","col-blue");
  renderCard(DATA.FY,"slots-fy","cnt-fy","gun-fy","gc-green","col-green");
  renderCard(DATA.FK,"slots-fk","cnt-fk","gun-fk","gc-purple","col-purple");
}

render();
setInterval(render,30000);
</script>
