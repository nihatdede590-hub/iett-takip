<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Widget İçin Optimize Edilmiş CSS */
        * { box-sizing: border-box; }
        body { 
            background-color: #0d1117; 
            color: #ffffff; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
            margin: 0; 
            padding: 8px;
            overflow: hidden; /* Kaydırma çubuğunu gizle */
        }
        .header-main {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #8b949e;
            margin-bottom: 5px;
            padding: 0 5px;
        }
        .card { 
            background: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            padding: 8px; 
            margin-bottom: 6px;
            display: flex;
            flex-direction: column;
        }
        .bus-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .bus-badge { 
            background: #1f6feb; 
            color: white; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 11px;
        }
        .route { font-size: 10px; color: #8b949e; }
        .times { 
            display: flex; 
            justify-content: space-around; 
            background: #0d1117;
            border-radius: 5px;
            padding: 5px 0;
        }
        .time-group { text-align: center; }
        .label { font-size: 8px; color: #8b949e; margin-bottom: 2px; }
        .value { font-size: 16px; font-weight: bold; color: #58a6ff; }
    </style>
</head>
<body>
    <div class="header-main">
        <span>İETT SEFER TAKİP</span>
        <span id="live-clock">00:00</span>
    </div>

    <div class="card">
        <div class="bus-row">
            <span class="bus-badge">KM41-1</span>
            <span class="route">Başıbüyük ➔ Metro</span>
        </div>
        <div class="times">
            <div class="time-group"><div class="label">SONRAKİ</div><div class="value">06:44</div></div>
            <div class="time-group"><div class="label">DAHA SONRA</div><div class="value">07:09</div></div>
        </div>
    </div>

    <div class="card">
        <div class="bus-row">
            <span class="bus-badge" style="background: #238636;">19F-1</span>
            <span class="route">Yurt ➔ Kadıköy</span>
        </div>
        <div class="times">
            <div class="time-group"><div class="label">SONRAKİ</div><div class="value">06:30</div></div>
            <div class="time-group"><div class="label">DAHA SONRA</div><div class="value">06:40</div></div>
        </div>
    </div>

    <script>
        // Saati her saniye güncelle
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
