<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sefer Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f5;
  --muted: #6b6b80;
  --muted2: #9090a8;
  --km41: #4f9cf9;
  --km41-dim: rgba(79,156,249,0.12);
  --f19y: #34d399;
  --f19y-dim: rgba(52,211,153,0.12);
  --f19k: #a78bfa;
  --f19k-dim: rgba(167,139,250,0.12);
  --warn: #fb923c;
  --font-mono: 'Space Mono', monospace;
  --font-ui: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}
.app {
  max-width: 430px;
  margin: 0 auto;
  padding: 0 0 100px;
  position: relative;
  z-index: 1;
}
.status-area { height: env(safe-area-inset-top, 44px); }

.header {
  padding: 12px 20px 16px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.header-left h1 {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 400;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.header-left .city {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}
.clock-block { text-align: right; }
.clock-time {
  font-family: var(--font-mono);
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.03em;
  line-height: 1;
}
.clock-date { font-size: 11px; color: var(--muted); margin-top: 3px; }

.day-strip { padding: 0 20px 18px; }
.day-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: 100px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted2);
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--f19y);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

.card {
  margin: 0 16px 12px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  animation: slideUp 0.4s ease both;
}
.card:nth-child(1){animation-delay:0.05s}
.card:nth-child(2){animation-delay:0.13s}
.card:nth-child(3){animation-delay:0.21s}
@keyframes slideUp {
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
.card-km41 { border-top: 2px solid var(--km41); }
.card-f19y  { border-top: 2px solid var(--f19y); }
.card-f19k  { border-top: 2px solid var(--f19k); }

.card-head {
  padding: 14px 18px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
}
.route-info { display: flex; align-items: center; gap: 10px; }
.route-badge {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 8px;
  white-space: nowrap;
}
.badge-km41 { background: var(--km41-dim); color: var(--km41); }
.badge-f19y  { background: var(--f19y-dim); color: var(--f19y); }
.badge-f19k  { background: var(--f19k-dim); color: var(--f19k); }
.route-name { font-size: 12px; color: var(--muted2); line-height: 1.35; }
.sefer-count { font-size: 11px; color: var(--muted); font-family: var(--font-mono); white-space: nowrap; }

.slots { display: grid; grid-template-columns: 1fr 1fr 1fr; }
.slot {
  padding: 16px 10px 14px;
  text-align: center;
  position: relative;
}
.slot:not(:last-child)::after {
  content: '';
  position: absolute;
  right: 0; top: 18%; height: 64%;
  width: 0.5px;
  background: var(--border);
}
.slot-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 9px;
}
.slot-time {
  font-family: var(--font-mono);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
  margin-bottom: 6px;
}
.t-past  { color: #3a3a4a; }
.t-km    { color: var(--km41); }
.t-f19y  { color: var(--f19y); }
.t-f19k  { color: var(--f19k); }
.t-soon  { color: var(--text); }
.t-none  { color: #222230; }
.slot-sub { font-size: 10px; color: var(--muted); min-height: 13px; font-weight: 500; }
.slot-sub.hot { color: var(--warn); animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

.card-foot {
  padding: 9px 18px 13px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 0.5px solid var(--border);
}
.gun-tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 6px;
}
.gun-km { background: var(--km41-dim); color: var(--km41); }
.gun-fy  { background: var(--f19y-dim); color: var(--f19y); }
.gun-fk  { background: var(--f19k-dim); color: var(--f19k); }
.refresh-btn {
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: 100px;
  padding: 5px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted2);
  cursor: pointer;
  font-family: var(--font-ui);
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background 0.15s;
}
.refresh-btn:active { background: var(--border); }

.bottom-bar {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(10,10,15,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border);
  padding: 10px 20px calc(env(safe-area-inset-bottom, 8px) + 6px);
  display: flex;
  justify-content: center;
  gap: 8px;
  z-index: 100;
}
.chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 11px;
  color: var(--muted2);
  font-weight: 500;
}
.no-service {
  grid-column: 1/-1;
  padding: 26px;
  text-align: center;
  font-size: 13px;
  color: var(--muted);
}
</style>
</head>
<body>
<div class="status-area"></div>
<div class="app">

  <div class="header">
    <div class="header-left">
      <h1>İETT Sefer</h1>
      <div class="city">İstanbul</div>
    </div>
    <div class="clock-block">
      <div class="clock-time" id="clock">--:--</div>
      <div class="clock-date" id="clock-date">—</div>
    </div>
  </div>

  <div class="day-strip">
    <div class="day-pill">
      <div class="live-dot"></div>
      <span id="day-label">Yükleniyor...</span>
    </div>
  </div>

  <!-- KM41-1 -->
  <div class="card card-km41">
    <div class="card-head">
      <div class="route-info">
        <span class="route-badge badge-km41">KM41-1</span>
        <span class="route-name">Başıbüyük Sağlık →<br>Küçükyalı Metro</span>
      </div>
      <span class="sefer-count" id="cnt-km">— sefer</span>
    </div>
    <div class="slots" id="slots-km"></div>
    <div class="card-foot">
      <span class="gun-tag gun-km" id="gun-km">—</span>
      <button class="refresh-btn" onclick="render()">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M10.5 6A4.5 4.5 0 1 1 6 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 1.5 8 3.5M6 1.5 8 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Yenile
      </button>
    </div>
  </div>

  <!-- 19F-1 Yurt → Kadıköy -->
  <div class="card card-f19y">
    <div class="card-head">
      <div class="route-info">
        <span class="route-badge badge-f19y">19F-1</span>
        <span class="route-name">Yurt →<br>Kadıköy</span>
      </div>
      <span class="sefer-count" id="cnt-fy">— sefer</span>
    </div>
    <div class="slots" id="slots-fy"></div>
    <div class="card-foot">
      <span class="gun-tag gun-fy" id="gun-fy">—</span>
      <button class="refresh-btn" onclick="render()">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M10.5 6A4.5 4.5 0 1 1 6 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 1.5 8 3.5M6 1.5 8 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Yenile
      </button>
    </div>
  </div>

  <!-- 19F-1 Kadıköy → Yurt -->
  <div class="card card-f19k">
    <div class="card-head">
      <div class="route-info">
        <span class="route-badge badge-f19k">19F-1</span>
        <span class="route-name">Kadıköy →<br>Yurt</span>
      </div>
      <span class="sefer-count" id="cnt-fk">— sefer</span>
    </div>
    <div class="slots" id="slots-fk"></div>
    <div class="card-foot">
      <span class="gun-tag gun-fk" id="gun-fk">—</span>
      <button class="refresh-btn" onclick="render()">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M10.5 6A4.5 4.5 0 1 1 6 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 1.5 8 3.5M6 1.5 8 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Yenile
      </button>
    </div>
  </div>

</div>

<div class="bottom-bar">
  <div class="chip"><div class="live-dot"></div>Resmi İETT tarifesi</div>
  <div class="chip" id="updated">Her 30sn güncellenir</div>
</div>

<script>
const DATA = {
  KM: {
    I:["06:44","07:09","07:34","07:58","08:25","08:52","09:15","09:41","10:04","10:31","10:55","11:21","11:46","12:10","12:35","13:01","13:24","13:52","14:14","14:41","15:05","15:32","15:55","16:23","16:46","17:11","17:34","17:59","18:24","18:49","19:14","19:40"],
    C:["06:44","07:09","07:34","07:58","08:25","08:52","09:15","09:41","10:04","10:31","10:55","11:21","11:46","12:10","12:35","13:01","13:24","13:52","14:14","14:41","15:05","15:32","15:55","16:23","16:46","17:11","17:34","17:59","18:24","18:49","19:14","19:40"],
    P:["06:44","07:09","07:34","07:58","08:25","08:52","09:15","09:41","10:04","10:31","10:55","11:21","11:46","12:10","12:35","13:01","13:24","13:52","14:14","14:41","15:05","15:32","15:55","16:23","16:46","17:11","17:34","17:59","18:24","18:49","19:14","19:40"]
  },
  FY: {
    I:["06:30","06:40","06:48","06:55","07:00","07:05","07:10","07:15","07:20","07:25","07:30","07:35","07:40","07:45","07:50","07:55","08:00","08:05","08:10","08:15","08:20","08:26","08:32","08:40","08:48","08:57","09:06","09:15","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","13:30","14:00","14:30"],
    C:["07:00","07:30","07:50","08:10","08:30","08:50","09:10","09:30","09:50","10:10","10:30","10:50","11:10","11:30","11:49","12:07","12:24","12:41","13:00","13:20","13:40","14:00","14:20","14:40","15:00","15:20","15:40","16:00","16:20","16:40","17:00","17:20","17:40","18:00","18:20","18:41","19:02","19:23","19:45","20:10","20:30","20:50","21:10","21:30","21:50","22:10","22:30"],
    P:["07:00","08:00","09:00","10:00","11:00","11:30","12:00","12:35","13:21","13:48","14:15","14:42","15:09","15:36","16:03","16:30","16:57","17:24","17:51","18:20","18:45","19:05","19:30","20:00","20:30","21:00","21:30","22:00"]
  },
  FK: {
    I:["14:30","14:45","15:00","15:15","15:30","15:42","15:54","16:06","16:18","16:30","16:42","16:54","17:06","17:18","17:30","17:42","17:54","18:06","18:18","18:30","18:42","18:54","19:06","19:18","19:29","19:40","19:51","20:02","20:13","20:24","20:35","20:46","20:57","21:08","21:19","21:30","21:42","21:54","22:06","22:20"],
    C:["07:25","08:00","08:20","08:40","09:00","09:20","09:40","10:00","10:20","10:40","11:00","11:20","11:40","12:00","12:40","13:00","13:20","13:40","14:00","14:20","14:40","15:00","15:20","15:40","16:00","16:20","16:40","17:00","17:20","17:40","18:00","18:20","18:40","19:00","19:20","19:40","20:00","20:20","20:40","21:00","21:20","21:40","22:00","22:20","22:40","23:00"],
    P:["07:30","08:30","09:30","10:30","11:30","12:00","12:40","13:07","14:01","14:28","14:55","15:22","15:49","16:16","16:43","17:10","17:37","18:04","18:35","19:00","19:20","20:00","20:30","21:00","21:30","22:00","22:30"]
  }
};

function getGun(){const d=new Date().getDay();return d===6?"C":d===0?"P":"I";}
function gunAdi(g){return g==="C"?"Cumartesi":g==="P"?"Pazar":"Hafta İçi";}
function nowMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function toMin(s){const[h,m]=s.split(":").map(Number);return h*60+m;}
function diffText(s){
  const d=toMin(s)-nowMin();
  if(d===0)return"şu an";
  if(d>0)return d<=5?d+"dk ⚡":d+"dk sonra";
  return Math.abs(d)+"dk önce";
}

function makeSlots(saatler, nextCls){
  const now=nowMin();
  const past=saatler.filter(s=>toMin(s)<=now);
  const fut=saatler.filter(s=>toMin(s)>now);
  const son=past.length?past[past.length-1]:null;
  const bir=fut.length?fut[0]:null;
  const iki=fut.length>1?fut[1]:null;
  function slot(lbl,s,cls){
    if(!s)return`<div class="slot"><div class="slot-label">${lbl}</div><div class="slot-time t-none">──</div><div class="slot-sub"></div></div>`;
    const hot=toMin(s)-now>=0&&toMin(s)-now<=5;
    return`<div class="slot"><div class="slot-label">${lbl}</div><div class="slot-time ${cls}">${s}</div><div class="slot-sub${hot?" hot":""}">${diffText(s)}</div></div>`;
  }
  return slot("Son kalkan",son,"t-past")+slot("Bir sonraki",bir,nextCls)+slot("İki sonraki",iki,"t-soon");
}

function renderHat(saatler, slotsId, cntId, gunId, nextCls){
  if(!saatler||!saatler.length){
    document.getElementById(slotsId).innerHTML=`<div class="no-service">Bugün sefer yok.</div>`;
  } else {
    document.getElementById(slotsId).innerHTML=makeSlots(saatler,nextCls);
  }
  document.getElementById(cntId).textContent=(saatler?saatler.length:0)+" sefer";
  document.getElementById(gunId).textContent=gunAdi(getGun());
}

function render(){
  const g=getGun();
  const n=new Date();
  const gunler=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
  const aylar=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
  document.getElementById("clock").textContent=n.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("clock-date").textContent=gunler[n.getDay()]+" · "+n.getDate()+" "+aylar[n.getMonth()];
  document.getElementById("day-label").textContent=gunAdi(g)+" Tarifesi";
  document.getElementById("updated").textContent="Güncellendi "+n.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
  renderHat(DATA.KM[g]||DATA.KM.I,"slots-km","cnt-km","gun-km","t-km");
  renderHat(DATA.FY[g]||DATA.FY.I,"slots-fy","cnt-fy","gun-fy","t-f19y");
  renderHat(DATA.FK[g]||DATA.FK.I,"slots-fk","cnt-fk","gun-fk","t-f19k");
}

render();
setInterval(render,30000);
</script>
</body>
</html>
