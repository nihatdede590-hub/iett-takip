<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İETT Sefer Takip</title>
    <style>
        /* CSS Kodlarını Buraya Gömdüm (Dosya yolu hatasını önlemek için) */
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 10px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 5px; margin-bottom: 10px; }
        .bus-code { background: #1f6feb; color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .time-box { display: flex; justify-content: space-around; text-align: center; }
        .next-bus { color: #58a6ff; font-size: 1.2em; font-weight: bold; }
        .countdown { font-size: 0.8em; color: #8b949e; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <span class="bus-code">KM41-1</span>
            <span style="font-size: 0.8em;">Başıbüyük ➔ Küçükyalı</span>
        </div>
        <div class="time-box">
            <div>
                <div class="countdown">BİR SONRAKİ</div>
                <div id="km41-next" class="next-bus">--:--</div>
            </div>
            <div>
                <div class="countdown">İKİ SONRAKİ</div>
                <div id="km41-later" class="next-bus">--:--</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="header">
            <span class="bus-code" style="background: #238636;">19F-1</span>
            <span style="font-size: 0.8em;">Yurt ➔ Kadıköy</span>
        </div>
        <div class="time-box">
            <div>
                <div class="countdown">BİR SONRAKİ</div>
                <div id="19f-next" class="next-bus">--:--</div>
            </div>
            <div>
                <div class="countdown">İKİ SONRAKİ</div>
                <div id="19f-later" class="next-bus">--:--</div>
            </div>
        </div>
    </div>

    <script>
        // JavaScript buraya (Dashboard'u canlı tutmak için)
        // Buraya saat hesaplama mantığını ekleyebilirsin
        document.getElementById('km41-next').innerText = "06:44";
        document.getElementById('km41-later').innerText = "07:09";
        document.getElementById('19f-next').innerText = "06:30";
        document.getElementById('19f-later').innerText = "06:40";
    </script>
</body>
</html>
